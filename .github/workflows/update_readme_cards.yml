name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=merko&include_all_commits=true&count_private=true&hide_border=true&border_radius=10
          path: profile/stats.svg
          token: ${{ secrets.SECRET_TOKEN }}

      - name: Generate accurate top languages card
        uses: lowlighter/metrics@latest
        with:
          filename: profile/top-langs.svg
          token: ${{ secrets.SECRET_TOKEN }}
          base: ""
          plugin_languages: "yes"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_limit: "8"
          commits_authoring: "me, github-actions[bot]"
          
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
